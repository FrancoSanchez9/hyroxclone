<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" role="img">
  <title>Technogym</title>
  <!-- T mark: bold geometric T in a rounded square -->
  <rect x="2" y="8" width="44" height="44" rx="6" ry="6" fill="none" stroke="#ffffff" stroke-width="3"/>
  <line x1="12" y1="22" x2="36" y2="22" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <line x1="24" y1="22" x2="24" y2="42" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <!-- TECHNOGYM wordmark -->
  <text x="58" y="38" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="3" fill="#ffffff">TECHNOGYM</text>
</svg>
